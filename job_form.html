<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application</title>
    <link rel="stylesheet" href="job_form.css" />
  </head>
  <body>
    <div class="basic_detail">
      <h1>Job Application Form</h1>
      <form method="post" class="application_form" id="application_form">
        <!-- --- Section for the basic details --- -->
        <fieldset class="basic_info" id="basic_info">
          <legend>Personal Information</legend>
          <!-- --- First name Last name DOB Gender --- -->
          <div class="name_dob_gender_mail" id="name_dob_gender_mail">
            <div class="input-container">
              <label for="fname">First Name</label>
              <input type="text" name="fname" id="fname" placeholder="Jhon" />
            </div>

            <div class="input-container">
              <label for="lname">Last Name</label>
              <input type="text" name="lname" id="lname" placeholder="Doe" />
            </div>

            <div class="input-container">
              <label for="dob">D.O.B</label>
              <input
                type="date"
                name="dob"
                id="dob"
                min="1990-01-01"
                max="2020-12-31"
              />
            </div>

            <div class="input-container gender" id="gender">
              <label for="gender" id="gender_lable">Gender :</label>
              <label for="male">Male</label>
              <input type="radio" name="gender" id="male" />

              <label for="female">Female</label>
              <input type="radio" name="gender" id="female" />
            </div>

            <div class="input-container">
              <label for="email">E-mail</label>
              <input
                type="text"
                name="email"
                id="email"
                placeholder="example@xyz.com"
              />
            </div>
          </div>

          <!-- --- Email Phone Designation Relationship --- -->
          <div class="contact_desig_relation" id="name_dob_gender_mail">
            <div class="input-container">
              <label for="phone">Phone</label>
              <input
                type="text"
                name="phone"
                id="phone"
                placeholder="1234567890"
              />
            </div>

            <div class="input-container">
              <label for="designation">Designation</label>
              <input
                type="text"
                name="designation"
                id="designation"
                placeholder="your position"
              />
            </div>

            <div class="input-container">
              <label for="relation">Relationship</label>
              <select name="relation" id="relation">
                <option value="select status" selected disabled>
                  Select status
                </option>
                <option value="single">Single</option>
                <option value="married">Married</option>
              </select>
            </div>

            <div class="input-container address">
              <label for="address">Address</label>
              <input
                type="text"
                name="address"
                id="address"
                placeholder="Enter your complete address"
              />
            </div>
          </div>

          <!-- --- City State Zipcode --- -->
          <div class="city_state_zip" id="city_state_zip">
            <div class="input-container">
              <label for="city">City</label>
              <input
                type="text"
                name="city"
                id="city"
                placeholder="City name"
              />
            </div>
            <div class="input-container">
              <label for="state">State</label>
              <select name="state" id="state">
                <option selected disabled>Select state</option>
                <option value="AN">Andaman and Nicobar Islands</option>
                <option value="AP">Andhra Pradesh</option>
                <option value="AR">Arunachal Pradesh</option>
                <option value="AS">Assam</option>
                <option value="BR">Bihar</option>
                <option value="CH">Chandigarh</option>
                <option value="CT">Chhattisgarh</option>
                <option value="DN">Dadra and Nagar Haveli</option>
                <option value="DD">Daman and Diu</option>
                <option value="DL">Delhi</option>
                <option value="GA">Goa</option>
                <option value="GJ">Gujarat</option>
                <option value="HR">Haryana</option>
                <option value="HP">Himachal Pradesh</option>
                <option value="JK">Jammu and Kashmir</option>
                <option value="JH">Jharkhand</option>
                <option value="KA">Karnataka</option>
                <option value="KL">Kerala</option>
                <option value="LA">Ladakh</option>
                <option value="LD">Lakshadweep</option>
                <option value="MP">Madhya Pradesh</option>
                <option value="MH">Maharashtra</option>
                <option value="MN">Manipur</option>
                <option value="ML">Meghalaya</option>
                <option value="MZ">Mizoram</option>
                <option value="NL">Nagaland</option>
                <option value="OR">Odisha</option>
                <option value="PY">Puducherry</option>
                <option value="PB">Punjab</option>
                <option value="RJ">Rajasthan</option>
                <option value="SK">Sikkim</option>
                <option value="TN">Tamil Nadu</option>
                <option value="TG">Telangana</option>
                <option value="TR">Tripura</option>
                <option value="UP">Uttar Pradesh</option>
                <option value="UT">Uttarakhand</option>
                <option value="WB">West Bengal</option>
              </select>
            </div>
            <div class="input-container">
              <label for="zipcode">Zipcode</label>
              <input
                type="text"
                name="zipcode"
                id="zipcode"
                placeholder="Ex: 2139684"
              />
            </div>
          </div>
        </fieldset>

        <!-- --- Section for the education details --- -->
        <fieldset class="education" id="education">
          <legend>Education details</legend>

          <!-- --- Buttons to add or remove the education records  --- -->
          <div class="add_remove" id="add_remove">
            <h3>Add or remove the education records</h3>
            <button type="button" class="add" id="add_edu">Add Record</button>
            <button type="button" class="remove" id="rem_edu">Remove Record</button>
          </div>
        </fieldset>

        <!-- --- Section for the work experience details --- -->
        <fieldset class="work" id="work">
          <legend>Work Experience</legend>

          <!-- --- Buttons to add or remove the work records  --- -->
          <div class="add_remove">
            <h3>Add or remove the education records</h3>
            <button type="button" class="add" id="add_work">Add Record</button>
            <button type="button" class="remove" id="rem_work">Remove Record</button>
          </div>
        </fieldset>

        <!-- --- Section for the language known details --- -->
        <fieldset class="languages" id="languages">
          <legend>Languages Known</legend>

          <div class="launguage_record" id="launguage_record">
            <div class="input-container">
              <label for="hindi">Hindi</label>
              <input type="checkbox" name="hindi" id="hindi" />
            </div>

            <div class="input-container">
              <label for="speak">Speak</label>
              <input type="checkbox" name="speak1" id="speak1" />
            </div>

            <div class="input-container">
              <label for="speak">Write</label>
              <input type="checkbox" name="write1" id="write1" />
            </div>

            <div class="input-container">
              <label for="speak">Read</label>
              <input type="checkbox" name="read" id="read1" />
            </div>
          </div>

          <div class="launguage_record" id="launguage_record">
            <div class="input-container">
              <label for="gujrati">Gujarati</label>
              <input type="checkbox" name="gujrati" id="gujrati" />
            </div>

            <div class="input-container">
              <label for="speak">Speak</label>
              <input type="checkbox" name="speak2" id="speak2" />
            </div>

            <div class="input-container">
              <label for="speak">Write</label>
              <input type="checkbox" name="write2" id="write2" />
            </div>

            <div class="input-container">
              <label for="speak">Read</label>
              <input type="checkbox" name="read2" id="read2" />
            </div>
          </div>

          <div class="launguage_record" id="launguage_record">
            <div class="input-container">
              <label for="english">English</label>
              <input type="checkbox" name="english" id="english" />
            </div>

            <div class="input-container">
              <label for="speak">Speak</label>
              <input type="checkbox" name="speak3" id="speak3" />
            </div>

            <div class="input-container">
              <label for="speak">Write</label>
              <input type="checkbox" name="write3" id="write3" />
            </div>

            <div class="input-container">
              <label for="speak">Read</label>
              <input type="checkbox" name="read3" id="read3" />
            </div>
          </div>
        </fieldset>

        <!-- --- Section for the technologies known details --- -->
        <fieldset class="technologies" id="technologies">
          <legend>Technologies Known</legend>
          <div class="tech_record" id="tech_record">
            <div class="input-container">
              <label for="js">Javascript</label>
              <input type="checkbox" name="js" id="js" />
            </div>

            <div class="input-container">
              <label for="speak">Beginner</label>
              <input type="radio" name="js" id="beginner1" />
            </div>

            <div class="input-container">
              <label for="speak">Intermediate</label>
              <input type="radio" name="js" id="intermediate1" />
            </div>

            <div class="input-container">
              <label for="speak">Advenced</label>
              <input type="radio" name="js" id="advenced1" />
            </div>
          </div>

          <div class="tech_record" id="tech_record">
            <div class="input-container">
              <label for="node">Node</label>
              <input type="checkbox" name="node" id="node" />
            </div>

            <div class="input-container">
              <label for="speak">Beginner</label>
              <input type="radio" name="node" id="beginner2" />
            </div>

            <div class="input-container">
              <label for="speak">Intermediate</label>
              <input type="radio" name="node" id="intermediate2" />
            </div>

            <div class="input-container">
              <label for="speak">Advenced</label>
              <input type="radio" name="node" id="advenced2" />
            </div>
          </div>

          <div class="tech_record" id="tech_record">
            <div class="input-container">
              <label for="react">React</label>
              <input type="checkbox" name="react" id="react" />
            </div>

            <div class="input-container">
              <label for="speak">Beginner</label>
              <input type="radio" name="react" id="beginner3" />
            </div>

            <div class="input-container">
              <label for="speak">Intermediate</label>
              <input type="radio" name="react" id="intermediate3" />
            </div>

            <div class="input-container">
              <label for="speak">Advenced</label>
              <input type="radio" name="react" id="advenced3" />
            </div>
          </div>

          <div class="tech_record" id="tech_record">
            <div class="input-container">
              <label for="python">Python</label>
              <input type="checkbox" name="python" id="python" />
            </div>

            <div class="input-container">
              <label for="speak">Beginner</label>
              <input type="radio" name="python" id="beginner4" />
            </div>

            <div class="input-container">
              <label for="speak">Intermediate</label>
              <input type="radio" name="python" id="intermediate4" />
            </div>

            <div class="input-container">
              <label for="speak">Advenced</label>
              <input type="radio" name="python" id="advenced4" />
            </div>
          </div>

          <div class="tech_record" id="tech_record">
            <div class="input-container">
              <label for="sql">SQL</label>
              <input type="checkbox" name="sql" id="sql" />
            </div>

            <div class="input-container">
              <label for="speak">Beginner</label>
              <input type="radio" name="sql" id="beginner5" />
            </div>

            <div class="input-container">
              <label for="speak">Intermediate</label>
              <input type="radio" name="sql" id="intermediate5" />
            </div>

            <div class="input-container">
              <label for="speak">Advenced</label>
              <input type="radio" name="sql" id="advenced5" />
            </div>
          </div>
        </fieldset>

        <!-- --- Section for the technologies known details --- -->
        <fieldset class="reference" id="reference">
          <legend>References</legend>

          <div class="reference_record" id="reference_record">
            <div class="input-container">
              <label for="ref_name">Reference Name</label>
              <input
                type="text"
                name="ref_name"
                id="ref_name"
                placeholder="Jon Doe"
              />
            </div>

            <div class="input-container">
              <label for="ref_name">Reference Contact</label>
              <input
                type="text"
                name="ref_contact"
                id="ref_contact"
                placeholder="0123456789"
              />
            </div>

            <div class="input-container">
              <label for="ref_name">Reference Relation</label>
              <input
                type="text"
                name="ref_relation"
                id="ref_relation"
                placeholder="Ex: Friend"
              />
            </div>
          </div>
        </fieldset>

        <!-- --- Section for the preferences details --- -->
        <fieldset class="preference" id="preference">
          <legend>Preferences</legend>

          <div class="location_notice_department" id="location_notice_department">
            <div class="input-container">
              <label for="location">Preferred Location</label>
              <select name="location" id="location">
                <option selected disabled>Select state</option>
                <option value="AN">Andaman and Nicobar Islands</option>
                <option value="AP">Andhra Pradesh</option>
                <option value="AR">Arunachal Pradesh</option>
                <option value="AS">Assam</option>
                <option value="BR">Bihar</option>
                <option value="CH">Chandigarh</option>
                <option value="CT">Chhattisgarh</option>
                <option value="DN">Dadra and Nagar Haveli</option>
                <option value="DD">Daman and Diu</option>
                <option value="DL">Delhi</option>
                <option value="GA">Goa</option>
                <option value="GJ">Gujarat</option>
                <option value="HR">Haryana</option>
                <option value="HP">Himachal Pradesh</option>
                <option value="JK">Jammu and Kashmir</option>
                <option value="JH">Jharkhand</option>
                <option value="KA">Karnataka</option>
                <option value="KL">Kerala</option>
                <option value="LA">Ladakh</option>
                <option value="LD">Lakshadweep</option>
                <option value="MP">Madhya Pradesh</option>
                <option value="MH">Maharashtra</option>
                <option value="MN">Manipur</option>
                <option value="ML">Meghalaya</option>
                <option value="MZ">Mizoram</option>
                <option value="NL">Nagaland</option>
                <option value="OR">Odisha</option>
                <option value="PY">Puducherry</option>
                <option value="PB">Punjab</option>
                <option value="RJ">Rajasthan</option>
                <option value="SK">Sikkim</option>
                <option value="TN">Tamil Nadu</option>
                <option value="TG">Telangana</option>
                <option value="TR">Tripura</option>
                <option value="UP">Uttar Pradesh</option>
                <option value="UT">Uttarakhand</option>
                <option value="WB">West Bengal</option>
              </select>
            </div>
            
            <div class="input-container">
              <label for="notice">Notice Period (Months)</label>
              <input
                type="text"
                name="notice"
                id="notice"
                placeholder="Ex: 2"
              />
            </div>
            
            <div class="input-container">
              <label for="department">Department</label>
              <select name="department" id="department">
                <option value="dev" selected disabled>Select Department</option>
                <option value="hr">Development</option>
                <option value="hr">Human resources</option>
                <option value="qa">Quality Assurance</option>
                <option value="ba">Business Analyst</option>
              </select>
            </div>
          </div>

          <div class="current_expected" id="current_expected">
            <div class="input-container">
              <label for="expected">Expected CTC (Lakhs)</label>
              <input
                type="text"
                name="expected"
                id="expected"
                placeholder="Ex: 10"
              />
            </div>

            <div class="input-container">
              <label for="current">Current CTC (Lakhs)</label>
              <input
                type="text"
                name="current"
                id="current"
                placeholder="Ex: 6"
              />
            </div>
          </div>
        </fieldset>

        <!-- --- Section for the submit and reset buttons --- -->
        <div class="submit_section" id="submit_section">
          <input type="submit" value="Submit" id="submit" />
          <input type="reset" value="Resest" id="reset" />
        </div>
      </form>
    </div>

    <script src="job_form.js"></script>
  </body>
</html>
